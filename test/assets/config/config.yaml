admin:
    password: adminpassword
    username: admin
app:
    dry_run: false
    enable_deletion: false
    leaving_soon_days: 14
integrations:
    jellyfin:
        api_key: your-jellyfin-api-key-here
        enabled: true
        symlink_library:
            base_path: /data/media/leaving-soon
            enabled: true
            hide_when_empty: true
            movies_library_name: Test - Leaving Soon Movies
            tv_library_name: Test - Leaving Soon TV
        url: http://oxicleanarr-test-jellyfin:8096
    jellyseerr:
        api_key: your-jellyfin-api-key-here
        enabled: false
        url: http://127.0.0.1:41811
    jellystat:
        api_key: your-jellyfin-api-key-here
        enabled: false
        url: http://host.docker.internal:37741
    radarr:
        api_key: your-radarr-api-key-here
        enabled: true
        url: http://oxicleanarr-test-radarr:7878
    sonarr:
        api_key: your-sonarr-api-key-here
        enabled: false
        url: http://oxicleanarr-test-sonarr:8989
rules:
    movie_retention: 7d
    tv_retention: 120d
server:
    host: 0.0.0.0
    port: 9709
sync:
    auto_start: false
    full_interval: 3600
    incremental_interval: 900
